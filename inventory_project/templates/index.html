<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <h1>📦 Inventory Dashboard</h1>

    <!-- KPI CARDS -->
    <div class="cards">
        <div class="card" id="totalProducts">Loading products...</div>
        <div class="card" id="totalInventory">Loading inventory...</div>
        <div class="card" id="totalSales">Loading sales...</div>
    </div>

    <hr>

    <!-- SEARCH SECTION -->
    <h2>🔎 Search Products</h2>

    <input
        type="text"
        id="searchBox"
        placeholder="Type product name..."
        autocomplete="off"
    >

    <!-- SEARCH RESULTS -->
    <div id="results"></div>

    <!-- PRODUCT DETAILS (IMPORTANT FOR CLICK) -->
    <div id="productDetails" class="product-details"></div>

    <hr>

    <!-- CHART SECTION -->
    <h2>📊 Low Stock Chart</h2>
    <canvas id="chart"></canvas>

    <!-- JS -->
    <script src="/static/app.js"></script>

</body>
</html>
